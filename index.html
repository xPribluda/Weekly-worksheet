<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Worksheet</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6-uAPDdvxhd4RtxGahIcq6BeKlXGhaZk",
  authDomain: "accountability-worksheet.firebaseapp.com",
  projectId: "accountability-worksheet",
  storageBucket: "accountability-worksheet.firebasestorage.app",
  messagingSenderId: "426223413166",
  appId: "1:426223413166:web:733842471a33a1f4b90a3f"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──────────────────────────────────────────────
const SECTIONS = [
  { key: "goals",      label: "Goals for the Week", icon: "◎", placeholder: "What do you want to accomplish this week?", multi: true },
  { key: "wins",       label: "Top 3 Wins",          icon: "✦", placeholder: "Celebrate your victories, big and small.",  multi: true, max: 3 },
  { key: "challenges", label: "Challenges",           icon: "△", placeholder: "What got in the way?",                     multi: true },
  { key: "solutions",  label: "Solutions",            icon: "◈", placeholder: "How did you address them?",                multi: true },
  { key: "learned",    label: "What I've Learned",    icon: "◉", placeholder: "Insights, lessons, reflections...",        multi: false },
];

const PAST_WEEKS   = 52;
const FUTURE_WEEKS = 12;

let weekOffset  = 0;
let sheets      = {};
let currentUid  = null;
let saveTimer   = null;
let unsubSnap   = null;

// ── Firestore ──────────────────────────────────────────
function userDocRef(uid) {
  return doc(db, "users", uid, "data", "sheets");
}

async function loadFromFirestore(uid) {
  setStatus("syncing");
  try {
    const snap = await getDoc(userDocRef(uid));
    sheets = snap.exists() ? (snap.data().sheets || {}) : {};
  } catch(e) { console.error(e); }
  render();
  setStatus("saved");
  if (unsubSnap) unsubSnap();
  // Only re-render from remote changes if the update didn't come from us
  let localSave = false;
  unsubSnap = onSnapshot(userDocRef(uid), { includeMetadataChanges: true }, snap => {
    if (!snap.exists()) return;
    // hasPendingWrites = this is our own local write, skip re-render
    if (snap.metadata.hasPendingWrites) return;
    // fromCache = no network update, skip
    if (snap.metadata.fromCache) return;
    // This is a genuine remote update from another device
    const focused = document.activeElement;
    const inApp   = focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA');
    if (inApp) {
      // Just update the data silently, don't touch the DOM
      sheets = snap.data().sheets || {};
    } else {
      sheets = snap.data().sheets || {};
      render();
    }
    setStatus("saved");
  });
}

function scheduleSave() {
  setStatus("saving");
  clearTimeout(saveTimer);
  // Save after 1s of inactivity, but NEVER call render()
  saveTimer = setTimeout(saveToFirestore, 1000);
}

async function saveToFirestore() {
  if (!currentUid) return;
  try {
    await setDoc(userDocRef(currentUid), { sheets });
    setStatus("saved");
  }
  catch(e) { setStatus("error"); console.error(e); }
}

// ── Auth ───────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    currentUid = user.uid;
    showApp(user);
    loadFromFirestore(user.uid);
  } else {
    currentUid = null;
    if (unsubSnap) { unsubSnap(); unsubSnap = null; }
    showLogin();
  }
});

window.doSignIn = async () => {
  const email = document.getElementById("emailInput").value.trim();
  const pass  = document.getElementById("passInput").value;
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  if (!email || !pass) { errEl.textContent = "Please enter your email and password."; return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      "auth/invalid-credential":   "Incorrect email or password.",
      "auth/user-not-found":       "No account found with that email.",
      "auth/wrong-password":       "Incorrect password.",
      "auth/invalid-email":        "Please enter a valid email address.",
      "auth/too-many-requests":    "Too many attempts. Please try again later.",
    };
    errEl.textContent = msgs[e.code] || "Sign-in failed. Please try again.";
  }
};

window.doSignOut = async () => {
  if (unsubSnap) { unsubSnap(); unsubSnap = null; }
  await signOut(auth);
};

// allow pressing Enter in the password field
window.handleLoginKey = e => { if (e.key === "Enter") window.doSignIn(); };

// ── UI helpers ─────────────────────────────────────────
function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appShell").style.display    = "none";
}
function showApp(user) {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appShell").style.display    = "flex";
  document.getElementById("userEmail").textContent     = user.email;
}
function setStatus(state) {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  const map = { syncing:["◌ Syncing…","#7a8090"], saving:["◌ Saving…","#7a8090"], saved:["✓ Synced","#5a8060"], error:["✕ Error","#905050"] };
  const [text, color] = map[state] || map.saved;
  el.textContent = text; el.style.color = color;
}

// ── Date helpers ───────────────────────────────────────
function getMonday(offset) {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay() + 1 + offset * 7);
  return d;
}
function getWeekKey(o)       { return getMonday(o).toISOString().split("T")[0]; }
function getWeekShortLabel(o){ return getMonday(o).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function getWeekFullLabel(o) {
  const d = getMonday(o);
  const s = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  d.setDate(d.getDate()+6);
  return `${s} – ${d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
}
function getWeekYear(o) { return getMonday(o).getFullYear(); }

// ── Sheet helpers ──────────────────────────────────────
function emptySheet() { return { goals:[""], wins:["","",""], challenges:[""], solutions:[""], learned:"" }; }
function getSheet(key) { if (!sheets[key]) sheets[key] = emptySheet(); return sheets[key]; }
function hasData(key) {
  const s = sheets[key]; if (!s) return false;
  return s.goals?.some(g=>g.trim())||s.wins?.some(w=>w.trim())||
         s.challenges?.some(c=>c.trim())||s.solutions?.some(c=>c.trim())||s.learned?.trim();
}

// ── Navigation ─────────────────────────────────────────
window.goToCurrentWeek = () => { if (weekOffset!==0) navigate(-weekOffset); };
window.navigate = delta => {
  const n = weekOffset + delta;
  if (n > FUTURE_WEEKS || n < -PAST_WEEKS || delta === 0) return;
  const sec = document.getElementById("sections");
  sec.classList.add(delta < 0 ? "slide-out-right" : "slide-out-left");
  setTimeout(() => {
    weekOffset = n; render();
    sec.classList.remove("slide-out-left","slide-out-right");
    document.getElementById("mainArea").scrollTo({top:0,behavior:"smooth"});
  }, 140);
};
window.jumpTo = offset => { const d=offset-weekOffset; if(d!==0) navigate(d); };

// ── Sidebar ────────────────────────────────────────────
function renderSidebar() {
  const scroll = document.getElementById("sidebarScroll");
  scroll.innerHTML = "";
  if (FUTURE_WEEKS > 0) {
    addGroupLabel(scroll,"Upcoming",true);
    for (let i=FUTURE_WEEKS; i>=1; i--) scroll.appendChild(makeSidebarItem(i));
    const div=document.createElement("div"); div.className="sidebar-divider"; scroll.appendChild(div);
  }
  let lastYear=null;
  for (let i=0; i>=-PAST_WEEKS; i--) {
    const yr=getWeekYear(i);
    if (yr!==lastYear) { addGroupLabel(scroll,yr,false); lastYear=yr; }
    scroll.appendChild(makeSidebarItem(i));
  }
  const active=document.getElementById(`sw-${weekOffset}`);
  if (active) setTimeout(()=>active.scrollIntoView({block:"nearest",behavior:"smooth"}),60);
}
function addGroupLabel(parent,text,isFuture) {
  const d=document.createElement("div");
  d.className="sidebar-group-label"+(isFuture?" future":"");
  d.textContent=text; parent.appendChild(d);
}
function makeSidebarItem(i) {
  const key=getWeekKey(i), isFuture=i>0;
  const item=document.createElement("div");
  item.className=["week-item",isFuture?"future-week":"",hasData(key)?"has-data":"",i===weekOffset?"active":""].filter(Boolean).join(" ");
  item.id=`sw-${i}`; item.onclick=()=>window.jumpTo(i);
  const dot=document.createElement("div"); dot.className="week-dot";
  const wrap=document.createElement("div");
  const lbl=document.createElement("div"); lbl.className="week-item-label"; lbl.textContent=getWeekShortLabel(i);
  const sub=document.createElement("div"); sub.className="week-item-sub";
  sub.textContent=i===0?"This week":i>0?`in ${i}w`:`${Math.abs(i)}w ago`;
  wrap.appendChild(lbl); wrap.appendChild(sub); item.appendChild(dot); item.appendChild(wrap);
  return item;
}

// ── Main render ────────────────────────────────────────
function render() {
  if (!document.getElementById("weekLabel")) return;
  const key=getWeekKey(weekOffset), isFuture=weekOffset>0;
  const sheet=getSheet(key);
  document.body.classList.toggle("future-mode",isFuture);
  document.getElementById("weekLabel").textContent=getWeekFullLabel(weekOffset);
  const badge=document.getElementById("weekBadge");
  if (weekOffset===0) { badge.className="week-badge current"; badge.textContent="Current Week"; badge.style.display="inline-block"; }
  else if (isFuture)  { badge.className="week-badge upcoming"; badge.textContent=weekOffset===1?"Next Week":`${weekOffset} Weeks Away`; badge.style.display="inline-block"; }
  else                { badge.style.display="none"; }
  const banner=document.getElementById("futureBanner");
  if (isFuture) { banner.classList.remove("hidden"); document.getElementById("futureBannerText").textContent=`Planning ahead — edits saved for ${getWeekShortLabel(weekOffset)}.`; }
  else          { banner.classList.add("hidden"); }
  document.getElementById("nextBtn").disabled=weekOffset>=FUTURE_WEEKS;
  document.getElementById("prevBtn").disabled=weekOffset<=-PAST_WEEKS;
  renderSidebar();
  const container=document.getElementById("sections"); container.innerHTML="";
  SECTIONS.forEach((sec,si) => {
    const div=document.createElement("div"); div.className="section";
    if (si===SECTIONS.length-1) div.style.borderBottom="none";
    const iconCls=isFuture?"section-icon future":"section-icon";
    const header=`<div class="section-header"><span class="${iconCls}">${sec.icon}</span><span class="section-title">${sec.label}${sec.max?`<span class="section-cap">(up to ${sec.max})</span>`:""}</span></div>`;
    if (sec.multi) {
      const items=sheet[sec.key]||[""];
      const rows=items.map((val,idx)=>`<div class="input-row"><span class="input-num">${idx+1}.</span><input type="text" value="${esc(val)}" placeholder="${idx===0?esc(sec.placeholder):""}" oninput="window.updateList('${key}','${sec.key}',${idx},this.value)" />${items.length>1?`<button class="remove-btn" onclick="window.removeItem('${key}','${sec.key}',${idx})">×</button>`:""}</div>`).join("");
      const canAdd=!sec.max||items.length<sec.max;
      div.innerHTML=header+rows+(canAdd?`<button class="add-btn" onclick="window.addItem('${key}','${sec.key}',${sec.max||0})">+ Add</button>`:"");
    } else {
      div.innerHTML=header+`<textarea rows="4" placeholder="${esc(sec.placeholder)}" oninput="window.updateText('${key}','${sec.key}',this.value)">${esc(sheet[sec.key]||"")}</textarea>`;
    }
    container.appendChild(div);
  });
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
window.updateList = (wk,sk,idx,val) => {
  getSheet(wk)[sk][idx] = val;
  scheduleSave();
  refreshDot(wk);
};
window.updateText = (wk,sk,val) => {
  getSheet(wk)[sk] = val;
  scheduleSave();
  refreshDot(wk);
};
window.addItem    = (wk,sk,max)     => { const s=getSheet(wk); if(max&&s[sk].length>=max)return; s[sk].push(""); scheduleSave(); render(); };
window.removeItem = (wk,sk,idx)     => { const s=getSheet(wk); s[sk].splice(idx,1); if(!s[sk].length)s[sk]=["?"]; scheduleSave(); render(); };
function refreshDot(wk) {
  for (let i=-PAST_WEEKS; i<=FUTURE_WEEKS; i++) {
    if (getWeekKey(i)===wk) { const item=document.getElementById(`sw-${i}`); if(item)item.classList.toggle("has-data",hasData(wk)); break; }
  }
}
</script>

  input[type="text"]::placeholder, textarea::placeholder { color:#3e3a35; }
  textarea { resize:vertical; line-height:1.75; }
  .remove-btn { background:none; border:none; color:#3e3a35; cursor:pointer; font-size:16px; padding:0 4px; line-height:1; transition:color 0.2s; flex-shrink:0; }
  .remove-btn:hover { color:#c4952a; }
  .add-btn { background:none; border:1px dashed rgba(255,255,255,0.08); color:#5a5248; padding:7px 14px; font-size:11px; letter-spacing:0.1em; cursor:pointer; border-radius:2px; font-family:Georgia,serif; margin-left:26px; transition:all 0.2s; display:inline-block; margin-top:2px; }
  .add-btn:hover { border-color:rgba(255,255,255,0.2); color:#e8e4dc; }
  .slide-out-left  { opacity:0 !important; transform:translateX(-16px) !important; }
  .slide-out-right { opacity:0 !important; transform:translateX(16px) !important; }
  .footer { margin-top:48px; font-size:10px; color:#3a3530; letter-spacing:0.18em; text-transform:uppercase; }

  @media (max-width:600px) {
    .sidebar { width:100%; height:180px; border-right:none; border-bottom:1px solid rgba(255,255,255,0.07); flex-direction:row; flex-wrap:wrap; }
    .sidebar-header { padding:14px 16px 10px; border-bottom:none; border-right:1px solid rgba(255,255,255,0.07); }
    .sidebar-today-btn { margin:14px 0 0; width:auto; }
    .sidebar-scroll { flex:1; }
    .main-inner { padding:24px 20px 60px; }
  }
</style>
</head>
<body>
<div class="bg-ambient"></div>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon">◎</div>
    <div class="login-eyebrow">Weekly Worksheet</div>
    <h1 class="login-title">Reflect. Record. Grow.</h1>
    <input class="login-field" id="emailInput" type="email" placeholder="Email address" onkeydown="window.handleLoginKey(event)" />
    <input class="login-field" id="passInput"  type="password" placeholder="Password" onkeydown="window.handleLoginKey(event)" />
    <button class="login-btn" onclick="window.doSignIn()">Sign In</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-note">Your data is private and only accessible to you.</div>
  </div>
</div>

<!-- App -->
<div id="appShell">
  <div class="topbar">
    <span id="syncStatus">✓ Synced</span>
    <div class="topbar-divider"></div>
    <span id="userEmail"></span>
    <button class="signout-btn" onclick="window.doSignOut()">Sign out</button>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-eyebrow">Weekly Worksheet</div>
        <div class="sidebar-title">All Weeks</div>
      </div>
      <button class="sidebar-today-btn" onclick="window.goToCurrentWeek()">↩ This Week</button>
      <div class="sidebar-scroll" id="sidebarScroll"></div>
    </aside>
    <main class="main" id="mainArea">
      <div class="main-inner">
        <div class="future-banner hidden" id="futureBanner">
          <span>◇</span><span id="futureBannerText"></span>
        </div>
        <div class="week-heading">
          <div>
            <div class="week-heading-eyebrow">Week of</div>
            <div class="week-heading-date" id="weekLabel"></div>
          </div>
          <div id="weekBadge" style="display:none"></div>
        </div>
        <div class="week-arrows">
          <button class="arrow-btn" id="prevBtn" onclick="window.navigate(-1)">← Earlier</button>
          <button class="arrow-btn" id="nextBtn" onclick="window.navigate(1)">Later →</button>
        </div>
        <div id="sections"></div>
        <div class="footer">Synced to Firebase · private to you</div>
      </div>
    </main>
  </div>
</div>

</body>
</html>
