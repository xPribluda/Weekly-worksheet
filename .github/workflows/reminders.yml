name: Daily Reminders

on:
  schedule:
    - cron: '30 10 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
    - cron: '0 22 * * *'
    - cron: '0 00 * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send OneSignal Notification
        run: |
          HOUR=$(date +%-H)
          
          if [ "$HOUR" = "10" ]; then
            MESSAGE="📋 Good morning! Review your Weekly Operating System — check your goals, wins, roadblocks, and uncertainties."
          elif [ "$HOUR" = "13" ]; then
            MESSAGE="📋 Mid-morning check-in — how are your goals progressing today?"
          else
            MESSAGE="✨ Weekly Worksheet reminder — keep your momentum going!"
          fi

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_API_KEY }}" \
            -d "{
              \"app_id\": \"${{ secrets.ONESIGNAL_APP_ID }}\",
              \"included_segments\": [\"All\"],
              \"contents\": {\"en\": \"$MESSAGE\"},
              \"headings\": {\"en\": \"Weekly Worksheet\"}
            }" \
            https://onesignal.com/api/v1/notifications
